<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">

<!-- Remarque : Il est conseillé d'ajouter la balise viewport pour une meilleure adaptation aux appareils mobiles. -->
<!-- <meta name="viewport" content="width=device-width, initial-scale=1.0"> -->

<title>Formulaire d'Inscription</title>
</head>

<body>

<h1>Formulaire d'Inscription</h1>

<form>

<label>Nom :</label>
<input type="text" placeholder="Votre nom complet">
<br><br>

<label>Email :</label>
<input type="email" placeholder="exemple@mail.com">
<br><br>

<label>Mot de passe :</label>
<input type="password">
<br><br>

<label>Âge :</label>
<input type="number">
<br><br>

<label>Date de naissance :</label>
<input type="date">
<br><br>

<label>Couleur préférée :</label>
<input type="color">
<br><br>

<label>Volume préféré :</label>
<input type="range">
<br><br>

<label>Photo de profil :</label>
<input type="file">
<br><br>

<p>Genre :</p>

<input type="radio" name="genre"> Femme
<br>

<input type="radio" name="genre"> Homme
<br><br>

<p>Centres d'intérêt :</p>

<input type="checkbox"> Musique
<br>

<input type="checkbox"> Sport
<br><br>

<label>Niveau d'études :</label>

<select>
<option>--Choisissez--</option>
<option>Bac</option>
<option>Licence</option>
<option>Master</option>
<option>Doctorat</option>
</select>

<br><br>

<label>Pourquoi vous inscrire ?</label>
<br>

<textarea rows="4" cols="40" placeholder="Expliquez ici..."></textarea>

<br><br>

<input type="submit" value="S'inscrire">
<input type="reset" value="Réinitialiser">

</form>

<h2>Image</h2>

<img src="photoxx.jpg" alt="Photo" width="300">

<!-- Remarque : Il est préférable d'utiliser les balises <figure> et <figcaption> comme demandé dans le devoir. -->
<p>Exemple de photo de profil</p>

<h2>Audio</h2>

<audio controls>
<source src="audio.mp3" type="audio/mpeg">
</audio>

<h2>Vidéo MP4</h2>

<video controls width="300">
<source src="vidio222.mp4" type="video/mp4">
</video>

<h2>Liste des inscrits</h2>

<table border="1">

<tr>
<th>Nom</th>
<th>Email</th>
<th>Niveau</th>
</tr>

<tr>
<td>Celia</td>
<td>celia@mail.com</td>
<td>Licence</td>
</tr>

<tr>
<td>Fadoua</td>
<td>fadoua@mail.com</td>
<td>Master</td>
</tr>

</table>

</body>
</html>
